name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: sqlite+aiosqlite:///./test.db
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  postgres-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trade_ai
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: trade_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trade_ai -d trade_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://trade_ai:test-password@127.0.0.1:5432/trade_ai_test
      TEST_DATABASE_URL: postgresql+asyncpg://trade_ai:test-password@127.0.0.1:5432/trade_ai_test
      TEST_POSTGRES_URL: postgresql+asyncpg://trade_ai:test-password@127.0.0.1:5432/trade_ai_test
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -q tests/test_postgres_migration.py
