<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Trade AI Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f7f9; }
    .navbar { border-bottom: 1px solid #d9dee7; }
    .metric { border: 1px solid #d9dee7; border-radius: 8px; background: #fff; padding: 1rem; }
    .table-wrap { border: 1px solid #d9dee7; border-radius: 8px; background: #fff; overflow: hidden; }
    .table { margin-bottom: 0; }
    .content { max-width: 1280px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container-fluid content">
      <a class="navbar-brand fw-semibold" href="/admin">Trade AI Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/admin">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'config' %}active{% endif %}" href="/admin/config">Config</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'positions' %}active{% endif %}" href="/admin/positions">Positions</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'logs' %}active{% endif %}" href="/admin/logs">Logs</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'emergency' %}active{% endif %}" href="/admin/emergency">Emergency</a></li>
        </ul>
        <span class="navbar-text me-3">{{ identity }}</span>
        <form method="post" action="/admin/logout">
          <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
        </form>
      </div>
    </div>
  </nav>
  <main class="container-fluid content py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
