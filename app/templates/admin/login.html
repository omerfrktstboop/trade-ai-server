<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e14">
  <title>Admin Login — Trade AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-card: #161c26;
      --bg-input: #0d1117;
      --border: #212837;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
      --radius: 10px;
      --radius-lg: 14px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-page { width: 100%; max-width: 400px; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
    }
    .logo-title { font-size: 22px; font-weight: 700; margin-top: 12px; letter-spacing: -0.3px; }
    .logo-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    .login-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 16px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-primary); font-family: var(--font); font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn {
      width: 100%; padding: 12px 20px; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer;
      border: none; background: var(--accent); color: #fff;
      transition: all 0.2s; min-height: 48px; margin-top: 8px;
    }
    .btn:hover { background: #4c9ce6; }
    .btn:active { transform: scale(0.98); }
    .alert {
      padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px;
      font-size: 14px; display: flex; align-items: center; gap: 8px;
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid rgba(248, 81, 73, 0.25);
    }
    .status-row {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px; font-size: 13px; color: var(--text-secondary);
    }
    .status-row .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="logo-area">
      <div class="logo-icon">TA</div>
      <h1 class="logo-title">Trade AI Admin</h1>
      <p class="logo-sub">Secure management panel</p>
    </div>

    <div class="login-card">
      {% if error %}<div class="alert">⚠️ {{ error }}</div>{% endif %}
      <form method="post">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Enter admin password" autofocus required>
        </div>
        <button class="btn" type="submit">Sign In →</button>
      </form>
    </div>

    <div class="status-row">
      <span class="dot"></span> Server online
    </div>
  </div>
</body>
</html>
