<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 420px;">
    <h1 class="h4 mb-3">Trade AI Admin</h1>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login" class="border rounded-3 bg-white p-4">
      <label class="form-label" for="password">Admin Password</label>
      <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn btn-primary w-100 mt-3" type="submit">Login</button>
    </form>
  </main>
</body>
</html>
